<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Penjual - BelanjaKita</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="dashboard-seller.html" class="nav-brand"><i data-lucide="shopping-bag" color="var(--primary-green)"></i> BelanjaKita <span style="color:var(--text-muted); font-weight:400;">| Seller</span></a>
            <ul class="nav-links">
                <li><a href="dashboard-seller.html" class="active"><i data-lucide="layout-dashboard" width="18"></i> Dashboard</a></li>
                <li><a href="kelola-produk.html"><i data-lucide="package" width="18"></i> Kelola Produk</a></li>
                <li><a href="transaksi.html"><i data-lucide="file-text" width="18"></i> Transaksi</a></li>
            </ul>
            <div class="nav-actions">
                <a href="../auth/login.html" class="icon-btn"><i data-lucide="log-out" width="18"></i></a>
            </div>
        </div>
    </nav>
    <div class="container" style="padding-top: 32px; padding-bottom: 60px;">
        <h1 style="font-size:1.8rem; margin-bottom:24px;" data-animate="fade-right">Dashboard <span class="gradient-text">Penjual</span></h1>
        <div class="grid-3" style="margin-bottom:32px;">
            <div class="stat-card" data-animate="fade-up" data-delay="0">
                <div class="stat-card-title">Total Produk <i data-lucide="package" width="20" color="var(--primary-blue)"></i></div>
                <div class="stat-card-value" style="color:var(--primary-blue);" id="stat-prod">0</div>
                <div class="stat-card-desc">Produk di etalase Anda</div>
            </div>
            <div class="stat-card" data-animate="fade-up" data-delay="80">
                <div class="stat-card-title">Pesanan Masuk <i data-lucide="shopping-cart" width="20" color="var(--primary-green)"></i></div>
                <div class="stat-card-value" style="color:var(--primary-green);" id="stat-order">0</div>
                <div class="stat-card-desc">Pesanan yang perlu diproses</div>
            </div>
            <div class="stat-card" data-animate="fade-up" data-delay="160">
                <div class="stat-card-title">Total Pendapatan <i data-lucide="wallet" width="20" color="#FFC107"></i></div>
                <div class="stat-card-value" style="color:#FFC107;" id="stat-rev">Rp 0</div>
                <div class="stat-card-desc">Estimasi penghasilan</div>
            </div>
        </div>
        
        <div class="card" data-animate="fade-up" data-delay="200">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <h3 style="margin:0;">Pesanan Perlu Diproses</h3>
                <a href="transaksi.html" style="color:var(--primary-blue); font-size:0.9rem; font-weight:500;">Lihat Semua Transaksi</a>
            </div>
            <div class="table-responsive">
                <table class="table" id="seller-orders-table">
                    <thead>
                        <tr>
                            <th>ID Pesanan</th>
                            <th>Tanggal</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="../js/store.js"></script>
    <script src="../js/animations.js"></script>
    <script>
        function getStatusBadge(status) {
            const colors = {
                'Menunggu': 'background:#FFF3CD; color:#856404;',
                'Dibayar': 'background:#D1ECF1; color:#0C5460;',
                'Diproses': 'background:#CCE5FF; color:#004085;',
                'Dikirim': 'background:#D4EDDA; color:#155724;',
                'Terkirim': 'background:#E8F5E9; color:var(--primary-green);'
            };
            return `<span style="${colors[status] || 'background:#E8F5E9; color:var(--primary-green);'} padding:4px 12px; border-radius:20px; font-size:0.8rem; font-weight:600;">${status}</span>`;
        }

        function getNextStatus(status) {
            const flow = { 'Dibayar': 'Diproses', 'Diproses': 'Dikirim', 'Dikirim': 'Terkirim' };
            return flow[status] || null;
        }

        function getActionLabel(status) {
            const labels = { 'Dibayar': 'Proses', 'Diproses': 'Kirim', 'Dikirim': 'Konfirmasi Terkirim' };
            return labels[status] || null;
        }

        function handleAction(id) {
            const orders = JSON.parse(localStorage.getItem(KEYS.ORDERS)) || [];
            const order = orders.find(o => o.id === id);
            if (order) {
                const next = getNextStatus(order.status);
                if (next) {
                    const oldStatus = order.status;
                    order.status = next;
                    localStorage.setItem(KEYS.ORDERS, JSON.stringify(orders));
                    if (typeof showToast === 'function') {
                        showToast(`Status pesanan ${id} diubah dari "${oldStatus}" menjadi "${next}"`, 'success', 'Status Diperbarui');
                    }
                    renderDashboard();
                }
            }
        }

        function renderDashboard() {
            document.getElementById('stat-prod').innerText = getProducts().length;
            const orders = JSON.parse(localStorage.getItem(KEYS.ORDERS)) || [];

            // Pesanan yang perlu diproses: status Dibayar atau Diproses
            const pendingOrders = orders.filter(o => o.status === 'Dibayar' || o.status === 'Diproses');
            document.getElementById('stat-order').innerText = pendingOrders.length;

            let totalRev = orders.reduce((sum, o) => sum + o.total, 0);
            document.getElementById('stat-rev').innerText = formatRupiah(totalRev);

            const tbody = document.querySelector('#seller-orders-table tbody');
            // Show orders that still need action (not yet Terkirim)
            const activeOrders = orders.filter(o => o.status !== 'Terkirim').slice(0, 5);

            if (activeOrders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-muted text-center">Semua pesanan sudah diproses 🎉</td></tr>';
            } else {
                tbody.innerHTML = activeOrders.map(o => {
                    const actionLabel = getActionLabel(o.status);
                    const actionBtn = actionLabel
                        ? `<button class="btn btn-outline" style="padding:4px 12px; font-size:0.85rem;" onclick="handleAction('${o.id}')">${actionLabel}</button>`
                        : `<span class="text-muted" style="font-size:0.85rem;">—</span>`;
                    return `
                    <tr>
                        <td><strong>${o.id}</strong></td>
                        <td>${new Date(o.date).toLocaleDateString('id-ID')}</td>
                        <td>${formatRupiah(o.total)}</td>
                        <td>${getStatusBadge(o.status)}</td>
                        <td>${actionBtn}</td>
                    </tr>`;
                }).join('');
            }
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderDashboard();
        });
    </script>
</body>
</html>
