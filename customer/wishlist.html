<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist Saya - BelanjaKita</title>
    <meta name="description" content="Wishlist produk impian Anda di BelanjaKita">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .wishlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .wishlist-card { background: white; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border-color); display: flex; flex-direction: column; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .wishlist-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg); border-color: rgba(236, 72, 153, 0.2); }
        .wishlist-img-container { position: relative; width: 100%; height: 200px; overflow: hidden; }
        .wishlist-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .wishlist-card:hover .wishlist-img { transform: scale(1.08); }
        .wishlist-remove { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255, 255, 255, 0.9); border: none; display: flex; justify-content: center; align-items: center; color: #ec4899; cursor: pointer; transition: all 0.3s; z-index: 2; }
        .wishlist-remove:hover { background: #fee2e2; color: var(--danger); transform: scale(1.1); }
        .wishlist-info { padding: 20px; flex: 1; display: flex; flex-direction: column; }
    </style>
</head>
<body style="background-color: #f8fafc;">
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="nav-brand"><i data-lucide="shopping-bag" color="var(--primary-green)"></i> BelanjaKita</a>
            <ul class="nav-links">
                <li><a href="../index.html"><i data-lucide="home" width="18"></i> Beranda</a></li>
                <li><a href="dashboard-pembeli.html"><i data-lucide="layout-dashboard" width="18"></i> Dashboard</a></li>
                <li><a href="katalog.html"><i data-lucide="package" width="18"></i> Katalog</a></li>
                <li><a href="artikel.html"><i data-lucide="file-text" width="18"></i> Artikel</a></li>
                <li><a href="riwayat.html"><i data-lucide="history" width="18"></i> Riwayat</a></li>
            </ul>
            <div class="nav-actions">
                <a href="keranjang.html" class="icon-btn"><i data-lucide="shopping-cart" width="20"></i><span class="badge cart-badge-count">0</span></a>
                <a href="../auth/login.html" class="icon-btn"><i data-lucide="user" width="20"></i></a>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 32px; padding-bottom: 60px;">
        <div class="page-header" style="padding: 0 0 24px 0;" data-animate="fade-up">
            <div class="page-title">
                <h1>Wishlist <span class="gradient-text" style="background: linear-gradient(135deg, #ec4899, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Saya</span></h1>
                <p>Produk pilihan terbaik yang Anda simpan untuk dibeli nanti</p>
            </div>
            <a href="katalog.html" class="btn btn-primary"><i data-lucide="shopping-bag" width="18"></i> Cari Produk</a>
        </div>

        <div id="wishlist-container">
            <!-- Loaded via JS -->
            <div class="wishlist-grid" id="wishlist-grid"></div>
        </div>
    </div>

    <script src="../js/store.js"></script>
    <script src="../js/animations.js"></script>
    <script>
        function loadWishlist() {
            const wishlist = getWishlist();
            const products = getProducts();
            const grid = document.getElementById('wishlist-grid');
            
            // Filter products that are in the wishlist
            const wishlistedProducts = products.filter(p => wishlist.includes(p.id));

            if (wishlistedProducts.length === 0) {
                document.getElementById('wishlist-container').innerHTML = `
                    <div class="card text-center" style="padding: 60px 24px;">
                        <div style="width: 80px; height: 80px; background: #fdf2f8; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 24px;">
                            <i data-lucide="heart" width="40" height="40" color="#ec4899"></i>
                        </div>
                        <h3 style="margin-bottom: 8px;">Wishlist Anda masih kosong</h3>
                        <p class="text-muted" style="margin-bottom: 24px; max-width: 400px; margin-left: auto; margin-right: auto;">
                            Simpan produk-produk UMKM favorit Anda agar mudah ditemukan kembali dan dibeli kapan saja.
                        </p>
                        <a href="katalog.html" class="btn btn-primary">Mulai Belanja</a>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            grid.innerHTML = wishlistedProducts.map(p => `
                <div class="wishlist-card">
                    <div class="wishlist-img-container">
                        <img src="${p.image}" alt="${p.name}" class="wishlist-img">
                        <button class="wishlist-remove" onclick="removeWishlistItem(${p.id}, event)" title="Hapus dari Wishlist">
                            <i data-lucide="heart" width="18" height="18" fill="currentColor"></i>
                        </button>
                    </div>
                    <div class="wishlist-info">
                        <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:6px;">${p.category}</div>
                        <h3 style="font-size:1.05rem; font-weight:600; margin-bottom:8px; line-height:1.4;"><a href="detail-produk.html?id=${p.id}">${p.name}</a></h3>
                        <div style="display:flex; align-items:center; gap:4px; font-size:0.8rem; color:#FFC107; font-weight:600; margin-bottom:16px;">
                            <i data-lucide="star" fill="#FFC107" width="14"></i> ${p.rating}
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto; padding-top:16px; border-top:1px solid var(--border-color);">
                            <span style="font-weight:700; color:var(--primary-green); font-size:1.1rem;">${formatRupiah(p.price)}</span>
                            <button class="btn btn-primary" onclick="addWishlistToCart(${p.id})" style="padding: 8px 12px; font-size: 0.85rem;">
                                <i data-lucide="shopping-cart" width="16"></i> +Keranjang
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        function removeWishlistItem(id, event) {
            event.stopPropagation();
            toggleWishlist(id);
            loadWishlist();
            // Also update the dashboard if open
            if(window.opener) {
                window.opener.location.reload();
            }
        }

        function addWishlistToCart(id) {
            const products = getProducts();
            const product = products.find(p => p.id === id);
            if (product) {
                addToCart(product, 1);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadWishlist();
        });
    </script>
</body>
</html>
