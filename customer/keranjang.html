<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keranjang Belanja - BelanjaKita</title>
    <meta name="description" content="Keranjang belanja Anda di BelanjaKita">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <a href="../index.html" class="nav-brand"><i data-lucide="shopping-bag" color="var(--primary-green)"></i> BelanjaKita</a>
        <ul class="nav-links">
          <li><a href="../index.html"><i data-lucide="home" width="18"></i> Beranda</a></li>
          <li><a href="dashboard-pembeli.html"><i data-lucide="layout-dashboard" width="18"></i> Dashboard</a></li>
          <li><a href="katalog.html"><i data-lucide="package" width="18"></i> Katalog</a></li>
          <li><a href="artikel.html"><i data-lucide="file-text" width="18"></i> Artikel</a></li>
          <li><a href="riwayat.html"><i data-lucide="history" width="18"></i> Riwayat</a></li>
        </ul>
        <div class="nav-actions">
          <a href="keranjang.html" class="icon-btn"><i data-lucide="shopping-cart" width="20"></i><span class="badge cart-badge-count">0</span></a>
          <a href="../auth/login.html" class="icon-btn"><i data-lucide="user" width="20"></i></a>
        </div>
      </div>
    </nav>

    <div class="container" style="padding-top: 32px; padding-bottom: 60px">
      <div class="page-header" style="padding: 0 0 24px 0" data-animate="fade-up">
        <div class="page-title">
          <h1>Keranjang <span class="gradient-text">Belanja</span></h1>
          <p id="cart-count">0 produk dalam keranjang</p>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 32px">
        <div id="cart-items-container">
          <!-- Items loaded via JS -->
        </div>

        <div>
          <div class="summary-card" data-animate="fade-left" data-delay="200">
            <h3 style="margin-bottom: 20px; font-size: 1.1rem">Ringkasan Belanja</h3>
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--text-muted);">
              <span>Subtotal</span>
              <span id="summary-subtotal">Rp 0</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--text-muted);">
              <span>Ongkos Kirim</span>
              <span id="summary-shipping">Rp 0</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 24px; font-weight: 700; font-size: 1.2rem; border-top: 1px solid var(--border-color); padding-top: 16px;">
              <span>Total</span>
              <span style="color: var(--primary-green)" id="summary-total">Rp 0</span>
            </div>
            <a href="checkout.html" class="btn btn-primary btn-block" id="btn-checkout">Lanjut ke Pembayaran <i data-lucide="arrow-right" width="18"></i></a>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/store.js"></script>
    <script src="../js/animations.js"></script>
    <script>
      function renderCart() {
        const cart = getCart();
        const container = document.getElementById("cart-items-container");

        document.getElementById("cart-count").innerText = `${cart.length} produk dalam keranjang`;

        if (cart.length === 0) {
          container.innerHTML = `<div class="card" style="text-align:center; padding: 40px;" data-animate="zoom-in"><p>Keranjang masih kosong.</p><br><a href="katalog.html" class="btn btn-primary">Belanja Sekarang</a></div>`;
          document.getElementById("summary-subtotal").innerText = "Rp 0";
          document.getElementById("summary-shipping").innerText = "Rp 0";
          document.getElementById("summary-total").innerText = "Rp 0";
          document.getElementById("btn-checkout").style.pointerEvents = "none";
          document.getElementById("btn-checkout").style.opacity = "0.5";
          return;
        }

        container.innerHTML = cart.map((item, index) => `
            <div class="cart-item" style="animation-delay: ${index * 0.1}s;">
                <img src="${item.image}" alt="${item.name}">
                <div class="cart-item-info">
                    <div style="display:flex; justify-content:space-between;">
                        <h3 style="font-size:1rem; margin-bottom:4px;">${item.name}</h3>
                        <button onclick="removeItem(${index})" style="background:none; border:none; color:var(--danger); cursor:pointer; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.2) rotate(10deg)'" onmouseout="this.style.transform=''"><i data-lucide="trash-2" width="18"></i></button>
                    </div>
                    <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:12px;"><i data-lucide="store" width="14"></i> ${item.seller || "Toko UMKM"}</p>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-weight:700; color:var(--primary-green);">${formatRupiah(item.price)}</div>
                        <div class="qty-control">
                            <button class="qty-btn" onclick="updateQty(${index}, -1)"><i data-lucide="minus" width="14"></i></button>
                            <input type="text" class="qty-input" value="${item.qty}" readonly>
                            <button class="qty-btn" onclick="updateQty(${index}, 1)"><i data-lucide="plus" width="14"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        `).join("");

        let subtotal = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
        let shipping = 15000;

        document.getElementById("summary-subtotal").innerText = formatRupiah(subtotal);
        document.getElementById("summary-shipping").innerText = formatRupiah(shipping);
        document.getElementById("summary-total").innerText = formatRupiah(subtotal + shipping);
        document.getElementById("btn-checkout").style.pointerEvents = "auto";
        document.getElementById("btn-checkout").style.opacity = "1";

        lucide.createIcons();
      }

      function updateQty(index, delta) {
        const cart = getCart();
        cart[index].qty += delta;
        if (cart[index].qty < 1) cart[index].qty = 1;
        saveCart(cart);
        renderCart();
      }

      function removeItem(index) {
        const cart = getCart();
        const item = cart[index];
        cart.splice(index, 1);
        saveCart(cart);
        if (typeof showToast === 'function') {
            showToast(`${item.name} dihapus dari keranjang`, 'info', 'Dihapus');
        }
        renderCart();
      }

      document.addEventListener("DOMContentLoaded", renderCart);
    </script>
  </body>
</html>
