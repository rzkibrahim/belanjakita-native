<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Artikel - Admin BelanjaKita</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="dashboard-admin.html" class="nav-brand"><i data-lucide="shopping-bag" color="var(--primary-green)"></i> BelanjaKita</a>
            <ul class="nav-links">
                <li><a href="dashboard-admin.html"><i data-lucide="layout-dashboard" width="18"></i> Dashboard</a></li>
                <li><a href="kelola-artikel.html" class="active"><i data-lucide="file-text" width="18"></i> Artikel</a></li>
                <li><a href="kelola-produk.html"><i data-lucide="package" width="18"></i> Produk</a></li>
                <li><a href="kelola-pengguna.html"><i data-lucide="users" width="18"></i> Pengguna</a></li>
                <li><a href="kelola-transaksi.html"><i data-lucide="file-spreadsheet" width="18"></i> Transaksi</a></li>
            </ul>
            <div class="nav-actions">
                <span style="display:flex; align-items:center; gap:8px; color:var(--text-muted);"><i data-lucide="shield-check" color="#8b5cf6" width="18"></i> Admin</span>
                <a href="../auth/login.html" class="icon-btn"><i data-lucide="log-out" width="18"></i></a>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 32px; padding-bottom: 60px;">
        <a href="kelola-artikel.html" style="display:inline-flex; align-items:center; gap:8px; color:var(--text-muted); margin-bottom:24px; font-weight:500; font-size:0.9rem;" data-animate="fade-right">
            <i data-lucide="arrow-left" width="16"></i> Kembali ke Kelola Artikel
        </a>

        <div class="page-header" style="padding-top:0;" data-animate="fade-up">
            <div class="page-title">
                <h1><span class="gradient-text">Arsip</span> Artikel</h1>
                <p>Artikel yang diarsipkan dapat dipulihkan atau dihapus secara permanen</p>
            </div>
        </div>

        <div class="form-control" style="max-width:400px; display:flex; align-items:center; gap:8px; margin-bottom:32px; background:white;" data-animate="fade-up" data-delay="100">
            <i data-lucide="search" width="18" color="var(--text-muted)"></i>
            <input type="text" id="search-arsip" placeholder="Cari artikel diarsipkan..." style="border:none; outline:none; background:transparent; width:100%;" onkeyup="renderArsip()">
        </div>

        <div id="arsip-container"></div>
    </div>

    <script src="../js/store.js"></script>
    <script src="../js/animations.js"></script>
    <script>
        function pulihkanArtikel(id) {
            if (confirm('Pulihkan artikel ini ke daftar aktif?')) {
                unarchiveArticle(id);
                showToast('Artikel berhasil dipulihkan!', 'success', 'Dipulihkan');
                renderArsip();
            }
        }

        function hapusPermanen(id) {
            if (confirm('Hapus artikel ini secara PERMANEN? Tindakan ini tidak dapat dibatalkan.')) {
                deleteArchivedArticle(id);
                showToast('Artikel dihapus secara permanen', 'info', 'Dihapus');
                renderArsip();
            }
        }

        function renderArsip() {
            let archived = getArchivedArticles();
            const search = document.getElementById('search-arsip').value.toLowerCase();
            if (search) archived = archived.filter(a => a.title.toLowerCase().includes(search));

            const container = document.getElementById('arsip-container');

            if (archived.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:80px 20px; color:var(--text-muted);" class="stagger-item">
                        <div style="width:80px; height:80px; background:linear-gradient(135deg, #fef3c7, #fde68a); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
                            <i data-lucide="archive" width="36" color="#d97706"></i>
                        </div>
                        <h3 style="font-size:1.2rem; color:var(--text-main); margin-bottom:8px;">Arsip Kosong</h3>
                        <p style="font-size:0.9rem; max-width:400px; margin:0 auto;">Tidak ada artikel yang diarsipkan. Artikel yang diarsipkan akan muncul di sini.</p>
                        <a href="kelola-artikel.html" class="btn btn-outline" style="margin-top:24px;"><i data-lucide="arrow-left" width="16"></i> Kembali ke Artikel</a>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = `
                <div class="card stagger-item">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <span style="font-weight:600; color:var(--text-main);">${archived.length} artikel diarsipkan</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Gambar</th>
                                    <th>Judul</th>
                                    <th>Kategori</th>
                                    <th>Penulis</th>
                                    <th>Tanggal Arsip</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${archived.map(a => `
                                    <tr>
                                        <td><img src="${a.image}" alt="${a.title}" style="width:60px; height:45px; object-fit:cover; border-radius:6px;"></td>
                                        <td>
                                            <div style="font-weight:600; margin-bottom:2px;">${a.title}</div>
                                            <div style="font-size:0.8rem; color:var(--text-muted); max-width:250px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${a.summary}</div>
                                        </td>
                                        <td><span class="badge-archived">${a.category}</span></td>
                                        <td>${a.author}</td>
                                        <td style="font-size:0.85rem; color:var(--text-muted);">${a.archivedDate ? new Date(a.archivedDate).toLocaleDateString('id-ID') : '-'}</td>
                                        <td>
                                            <div class="action-btn-group">
                                                <button class="action-btn restore" onclick="pulihkanArtikel(${a.id})" title="Pulihkan">
                                                    <i data-lucide="rotate-ccw" width="14"></i>
                                                </button>
                                                <button class="action-btn delete" onclick="hapusPermanen(${a.id})" title="Hapus Permanen">
                                                    <i data-lucide="trash-2" width="14"></i>
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', renderArsip);
    </script>
</body>
</html>
