<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Transaksi - Admin BelanjaKita</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="dashboard-admin.html" class="nav-brand"><i data-lucide="shopping-bag" color="var(--primary-green)"></i> BelanjaKita</a>
            <ul class="nav-links">
                <li><a href="dashboard-admin.html"><i data-lucide="layout-dashboard" width="18"></i> Dashboard</a></li>
                <li><a href="kelola-artikel.html"><i data-lucide="file-text" width="18"></i> Artikel</a></li>
                <li><a href="kelola-produk.html"><i data-lucide="package" width="18"></i> Produk</a></li>
                <li><a href="kelola-pengguna.html"><i data-lucide="users" width="18"></i> Pengguna</a></li>
                <li><a href="kelola-transaksi.html" class="active"><i data-lucide="file-spreadsheet" width="18"></i> Transaksi</a></li>
            </ul>
            <div class="nav-actions">
                <span style="display:flex; align-items:center; gap:8px; color:var(--text-muted);"><i data-lucide="shield-check" color="#8b5cf6" width="18"></i> Admin</span>
                <a href="../auth/login.html" class="icon-btn"><i data-lucide="log-out" width="18"></i></a>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 32px; padding-bottom: 60px;">
        <div class="page-header" style="padding-top:0;" data-animate="fade-up">
            <div class="page-title">
                <h1>Kelola <span class="gradient-text">Transaksi</span></h1>
                <p>Pantau dan kelola semua transaksi di platform</p>
            </div>
            <select class="form-control" style="width:200px; background:white;">
                <option>Semua Status</option>
                <option>Terkirim</option>
                <option>Diproses</option>
            </select>
        </div>

        <div class="grid-4" style="margin-bottom:32px; grid-template-columns: repeat(5, 1fr);">
            <div class="stat-card" style="box-shadow:none; text-align:center;">
                <div class="stat-card-value" style="font-size:1.5rem;" id="stat-total">0</div>
                <div class="stat-card-title" style="justify-content:center;">Total</div>
            </div>
            <div class="stat-card" style="box-shadow:none; text-align:center;">
                <div class="stat-card-value" style="font-size:1.5rem;">0</div>
                <div class="stat-card-title" style="justify-content:center;">Menunggu</div>
            </div>
            <div class="stat-card" style="box-shadow:none; text-align:center;">
                <div class="stat-card-value" style="font-size:1.5rem;">0</div>
                <div class="stat-card-title" style="justify-content:center;">Diproses</div>
            </div>
            <div class="stat-card" style="box-shadow:none; text-align:center;">
                <div class="stat-card-value" style="font-size:1.5rem;">0</div>
                <div class="stat-card-title" style="justify-content:center;">Dikirim</div>
            </div>
            <div class="stat-card" style="box-shadow:none; text-align:center;">
                <div class="stat-card-value" style="font-size:1.5rem; color:var(--primary-green);" id="stat-terkirim">0</div>
                <div class="stat-card-title" style="justify-content:center;">Terkirim</div>
            </div>
        </div>

        <div id="admin-orders-container" style="display:flex; flex-direction:column; gap:24px;">
            <!-- Loaded via JS -->
        </div>
    </div>

    <script src="../js/store.js"></script>
    <script src="../js/animations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const orders = JSON.parse(localStorage.getItem(KEYS.ORDERS)) || [];
            document.getElementById('stat-total').innerText = orders.length;
            document.getElementById('stat-terkirim').innerText = orders.filter(o => o.status === 'Terkirim' || o.status === 'Dibayar').length;
            
            const container = document.getElementById('admin-orders-container');
            if(orders.length === 0) {
                container.innerHTML = '<p class="text-muted text-center">Belum ada transaksi.</p>';
                return;
            }
            container.innerHTML = orders.map((o, idx) => `
                <div class="stagger-item" style="border:1px solid var(--border-color); border-radius:var(--radius-lg); padding:24px; background:white; animation-delay:${idx * 0.1}s; transition: all 0.3s;" onmouseover="this.style.boxShadow='var(--shadow-md)'" onmouseout="this.style.boxShadow=''">
                    <div style="display:flex; justify-content:space-between; margin-bottom:16px; border-bottom:1px solid var(--border-color); padding-bottom:16px; background:#fafafa; margin:-24px -24px 24px -24px; padding:24px; border-radius:var(--radius-lg) var(--radius-lg) 0 0;">
                        <div>
                            <div style="font-weight:700; display:flex; align-items:center; gap:8px;"><i data-lucide="box" width="18" color="var(--primary-green)"></i> ${o.id}</div>
                            <div style="font-size:0.85rem; color:var(--text-muted);">${new Date(o.date).toLocaleString('id-ID')}</div>
                        </div>
                        <div style="display:flex; gap:12px; align-items:center;">
                            <span style="background:#E8F5E9; color:var(--primary-green); padding:4px 12px; border-radius:20px; font-size:0.8rem; font-weight:600;">${o.status}</span>
                            <select class="form-control" style="width:auto; padding:4px 8px; font-size:0.85rem;" onchange="handleStatusChange('${o.id}', this.value)">
                                <option value="Menunggu" ${o.status === 'Menunggu' ? 'selected' : ''}>Menunggu</option>
                                <option value="Dibayar" ${o.status === 'Dibayar' ? 'selected' : ''}>Dibayar</option>
                                <option value="Diproses" ${o.status === 'Diproses' ? 'selected' : ''}>Diproses</option>
                                <option value="Terkirim" ${o.status === 'Terkirim' ? 'selected' : ''}>Terkirim</option>
                            </select>
                        </div>
                    </div>

                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; margin-bottom:24px;">
                        <div>
                            <div style="font-weight:600; font-size:0.85rem; margin-bottom:4px;">Pembeli</div>
                            <div style="font-size:0.9rem; color:var(--text-muted);">Dita Rahma Putri</div>
                        </div>
                        <div>
                            <div style="font-weight:600; font-size:0.85rem; margin-bottom:4px;">Penjual</div>
                            <div style="font-size:0.9rem; color:var(--text-muted);">${o.items[0]?.seller || 'Arif Nugroho'}</div>
                        </div>
                        <div>
                            <div style="font-weight:600; font-size:0.85rem; margin-bottom:4px;">Pembayaran</div>
                            <div style="font-size:0.9rem; color:var(--text-muted);">E-Wallet</div>
                        </div>
                    </div>

                    <div style="font-weight:600; font-size:0.85rem; margin-bottom:12px;">Produk</div>
                    ${o.items.map(i => `
                        <div style="display:flex; gap:16px; margin-bottom:12px; border-bottom:1px dashed var(--border-color); padding-bottom:12px;">
                            <img src="${i.image}" alt="${i.name}" style="width:40px; height:40px; object-fit:cover; border-radius:4px;">
                            <div style="flex:1;">
                                <div style="font-size:0.9rem; font-weight:500;">${i.name}</div>
                                <div style="font-size:0.8rem; color:var(--text-muted);">${i.qty} x ${formatRupiah(i.price)}</div>
                            </div>
                            <div style="font-weight:600; font-size:0.9rem;">${formatRupiah(i.price * i.qty)}</div>
                        </div>
                    `).join('')}
                    
                    <div style="text-align:right; padding-top:12px;">
                        <div style="font-size:0.85rem; color:var(--text-muted);">Total Pembayaran</div>
                        <div style="font-weight:700; color:var(--primary-green); font-size:1.2rem;">${formatRupiah(o.total)}</div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        });

        function handleStatusChange(id, newStatus) {
            if (updateOrderStatus(id, newStatus)) {
                setTimeout(() => {
                    window.location.reload();
                }, 1000);
            }
        }
    </script>
</body>
</html>
